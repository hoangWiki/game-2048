<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0d0d1a"/>
<title>Gem Blast</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d1a;min-height:100vh;display:flex;flex-direction:column;align-items:center;
  font-family:'Segoe UI',system-ui,sans-serif;color:#fff;padding:8px 12px 32px;
  user-select:none;-webkit-user-select:none}
a.back{position:fixed;top:12px;left:12px;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);color:#fff;text-decoration:none;
  padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;z-index:100}
h1{font-size:clamp(20px,5vw,26px);font-weight:800;
  background:linear-gradient(90deg,#f472b6,#fb923c,#fbbf24);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  margin:2px 0 6px}
canvas{border-radius:16px;display:block;cursor:pointer;touch-action:none;
  border:1px solid rgba(255,255,255,.06)}
.hint{margin-top:10px;font-size:12px;opacity:.38;text-align:center}
</style>
</head>
<body>
<a class="back" href="index.html">← Games</a>
<h1>💎 Gem Blast</h1>
<canvas id="canvas"></canvas>
<p class="hint">Tap 2+ touching gems of the same color!</p>
<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const CW=360,CH=500;
let scale=1;
function resize(){
  const a=Math.min(window.innerWidth-24,440);
  scale=Math.min(a/CW,1.35);
  canvas.width=CW*scale;canvas.height=CH*scale;
  ctx.setTransform(scale,0,0,scale,0,0);
}
resize();window.addEventListener('resize',resize);

const COLS=7,ROWS=9,TS=44;
const GRID_X=(CW-COLS*TS)/2, GRID_Y=88;
const GEMS=['#ff6b6b','#4ade80','#4cc9f0','#ffd166','#f472b6','#a78bfa'];
const LEVELS=[[15,16],[25,18],[35,20],[50,22],[70,25]];

function rr(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

let grid,parts,score,cleared,target,movesLeft,level,phase,hoverGroup;

function initLevel(lv){
  level=lv%LEVELS.length;
  [target,movesLeft]=LEVELS[level];
  score=0;cleared=0;parts=[];phase='play';hoverGroup=[];
  grid=Array.from({length:ROWS},()=>
    Array.from({length:COLS},()=>GEMS[Math.floor(Math.random()*GEMS.length)]));
  // Ensure no immediate single-gem islands: reshuffle until there's at least one valid move
  let attempts=0;
  while(!hasValidMove()&&attempts++<20){
    grid=Array.from({length:ROWS},()=>
      Array.from({length:COLS},()=>GEMS[Math.floor(Math.random()*GEMS.length)]));
  }
}

function hasValidMove(){
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++)
      if(grid[r][c]&&getGroup(r,c).length>=2)return true;
  return false;
}

function getGroup(r,c){
  const color=grid[r][c];if(!color)return[];
  const visited=new Set(),queue=[[r,c]],group=[];
  while(queue.length){
    const[cr,cc]=queue.shift();
    const k=cr*COLS+cc;
    if(visited.has(k)||cr<0||cr>=ROWS||cc<0||cc>=COLS||grid[cr][cc]!==color)continue;
    visited.add(k);group.push([cr,cc]);
    queue.push([cr-1,cc],[cr+1,cc],[cr,cc-1],[cr,cc+1]);
  }
  return group;
}

function blast(r,c){
  if(phase!=='play'||!grid[r][c])return;
  const group=getGroup(r,c);
  if(group.length<2)return;
  movesLeft--;
  const pts=group.length*group.length*5;
  score+=pts;cleared+=group.length;
  // Particles
  group.forEach(([gr,gc])=>{
    const px=GRID_X+gc*TS+TS/2,py=GRID_Y+gr*TS+TS/2;
    const col=grid[gr][gc];
    for(let i=0;i<8;i++){
      const a=Math.random()*Math.PI*2,s=2+Math.random()*5;
      parts.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s-.5,
        color:col,r:3+Math.random()*5,life:1,decay:.04+Math.random()*.03});
    }
    grid[gr][gc]=null;
  });
  // Gravity per column (bottom-fill)
  for(let col=0;col<COLS;col++){
    const vals=[];
    for(let row=ROWS-1;row>=0;row--)if(grid[row][col])vals.push(grid[row][col]);
    for(let row=ROWS-1;row>=0;row--){
      grid[row][col]=vals.length>0?vals.shift():GEMS[Math.floor(Math.random()*GEMS.length)];
    }
  }
  hoverGroup=[];
  if(cleared>=target)phase='win';
  else if(movesLeft<=0)phase='lose';
}

function drawGem(x,y,color,size,glow){
  const r=size/2-3;
  if(glow){ctx.shadowColor=color;ctx.shadowBlur=16;}
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=color;ctx.fill();
  ctx.shadowBlur=0;
  // Shine overlay
  const sg=ctx.createRadialGradient(x-r*.28,y-r*.32,r*.04,x,y,r);
  sg.addColorStop(0,'rgba(255,255,255,.55)');
  sg.addColorStop(.55,'rgba(255,255,255,.08)');
  sg.addColorStop(1,'rgba(0,0,0,.3)');
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=sg;ctx.fill();
}

function drawBtn(cx,cy,label,c1,c2){
  const bx=cx-70,by=cy-22,bw=140,bh=44;
  rr(bx,by,bw,bh,22);
  const bg=ctx.createLinearGradient(bx,0,bx+bw,0);
  bg.addColorStop(0,c1);bg.addColorStop(1,c2);ctx.fillStyle=bg;ctx.fill();
  ctx.font='bold 15px system-ui';ctx.fillStyle='#fff';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,cx,cy+1);
}

function draw(){
  ctx.fillStyle='#0d0d1a';ctx.fillRect(0,0,CW,CH);
  ctx.strokeStyle='rgba(255,255,255,.03)';ctx.lineWidth=1;
  for(let y=0;y<CH;y+=44){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}

  // HUD
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.font='13px system-ui';ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.fillText(`Moves: ${movesLeft}`,12,12);
  ctx.fillText(`Level ${level+1}/5`,12,30);
  ctx.textAlign='right';
  ctx.fillText(`${cleared}/${target}`,CW-12,12);
  ctx.fillText(`Score: ${score}`,CW-12,30);
  // Progress bar
  const pw=Math.max(0,(CW-24)*Math.min(cleared/target,1));
  rr(12,55,CW-24,10,5);ctx.fillStyle='rgba(255,255,255,.1)';ctx.fill();
  if(pw>0){
    const pbg=ctx.createLinearGradient(12,0,CW-12,0);
    pbg.addColorStop(0,'#f472b6');pbg.addColorStop(1,'#fbbf24');
    ctx.fillStyle=pbg;rr(12,55,pw,10,5);ctx.fill();
  }

  // Grid background
  ctx.fillStyle='rgba(255,255,255,.04)';
  rr(GRID_X-4,GRID_Y-4,COLS*TS+8,ROWS*TS+8,10);ctx.fill();

  // Gems
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++){
      if(!grid[r][c])continue;
      const inH=hoverGroup.some(([hr,hc])=>hr===r&&hc===c);
      drawGem(GRID_X+c*TS+TS/2,GRID_Y+r*TS+TS/2,grid[r][c],inH?TS+4:TS,inH);
    }

  // Particles
  for(const p of parts){
    ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  // Overlays
  if(phase==='win'||phase==='lose'){
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,CW,CH);
    ctx.textAlign='center';ctx.textBaseline='middle';
    if(phase==='win'){
      ctx.font='bold 34px system-ui';ctx.fillStyle='#4ade80';
      ctx.shadowColor='#4ade80';ctx.shadowBlur=20;ctx.fillText('🎉 Level Clear!',CW/2,CH/2-58);ctx.shadowBlur=0;
      ctx.font='15px system-ui';ctx.fillStyle='rgba(255,255,255,.65)';
      ctx.fillText(`+${score} pts  ·  ${cleared} gems cleared`,CW/2,CH/2-18);
      const isLast=level>=LEVELS.length-1;
      drawBtn(CW/2,CH/2+22,isLast?'▶ Play Again':'▶ Next Level','#4ade80','#22d3ee');
    } else {
      ctx.font='bold 34px system-ui';ctx.fillStyle='#ff6b6b';
      ctx.shadowColor='#ff6b6b';ctx.shadowBlur=20;ctx.fillText('Out of Moves!',CW/2,CH/2-58);ctx.shadowBlur=0;
      ctx.font='15px system-ui';ctx.fillStyle='rgba(255,255,255,.65)';
      ctx.fillText(`${cleared}/${target} gems — keep trying!`,CW/2,CH/2-18);
      drawBtn(CW/2,CH/2+22,'↺ Try Again','#ff6b6b','#f97316');
    }
  }
}

function loop(){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.25;p.life-=p.decay;
    if(p.life<=0)parts.splice(i,1);
  }
  draw();requestAnimationFrame(loop);
}

function toGame(e){
  const r=canvas.getBoundingClientRect();
  const src='touches' in e?e.changedTouches[0]:e;
  return{gx:(src.clientX-r.left)/scale,gy:(src.clientY-r.top)/scale};
}
function cellAt(gx,gy){
  const c=Math.floor((gx-GRID_X)/TS),r=Math.floor((gy-GRID_Y)/TS);
  if(r<0||r>=ROWS||c<0||c>=COLS)return null;
  return[r,c];
}

canvas.addEventListener('mousemove',e=>{
  const{gx,gy}=toGame(e);
  const rc=cellAt(gx,gy);
  hoverGroup=rc&&grid[rc[0]]&&grid[rc[0]][rc[1]]?getGroup(rc[0],rc[1]):[];
});
canvas.addEventListener('mouseleave',()=>hoverGroup=[]);

canvas.addEventListener('click',e=>{
  const{gx,gy}=toGame(e);
  if(phase==='win'){
    initLevel(level>=LEVELS.length-1?0:level+1);return;
  }
  if(phase==='lose'){initLevel(level);return;}
  const rc=cellAt(gx,gy);
  if(rc)blast(rc[0],rc[1]);
  hoverGroup=[];
});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  const{gx,gy}=toGame(e);
  if(phase==='win'){initLevel(level>=LEVELS.length-1?0:level+1);return;}
  if(phase==='lose'){initLevel(level);return;}
  const rc=cellAt(gx,gy);
  if(rc)blast(rc[0],rc[1]);
  hoverGroup=[];
},{passive:false});

initLevel(0);loop();
</script>
</body>
</html>
