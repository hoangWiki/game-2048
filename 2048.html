<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#faf8ef" />
  <title>2048</title>
  <script src="auth.js"></script>
  <script src="leaderboard.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #faf8ef;
      font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px 16px 40px;
      color: #776e65;
      user-select: none;
    }

    /* ── Header ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      width: 100%;
      max-width: 480px;
      margin-bottom: 16px;
    }

    .title {
      font-size: clamp(52px, 14vw, 80px);
      font-weight: 700;
      line-height: 1;
      color: #776e65;
    }

    .scores {
      display: flex;
      gap: 8px;
    }

    .score-box {
      background: #bbada0;
      border-radius: 4px;
      padding: 8px 14px;
      text-align: center;
      min-width: 72px;
    }

    .score-label {
      font-size: 10px;
      color: #eee4da;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .score-value {
      font-size: clamp(16px, 4.5vw, 22px);
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 480px;
      margin-bottom: 12px;
      gap: 12px;
    }

    .subtitle {
      font-size: 14px;
      line-height: 1.4;
    }

    .btn {
      background: #8f7a66;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-family: inherit;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn:hover { background: #7f6a56; }
    .btn:active { background: #6f5a46; }

    /* ── Board ── */
    .board-wrapper {
      position: relative;
      width: 100%;
      max-width: 480px;
    }

    .board {
      background: #bbada0;
      border-radius: 8px;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 12px;
      aspect-ratio: 1 / 1;
    }

    /* empty cell background */
    .cell {
      background: rgba(238, 228, 218, 0.35);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      transition: background 0.08s, color 0.08s;
    }

    /* ── Tile colours ── */
    .cell[data-v="2"]    { background: #eee4da; color: #776e65; }
    .cell[data-v="4"]    { background: #ede0c8; color: #776e65; }
    .cell[data-v="8"]    { background: #f2b179; color: #f9f6f2; }
    .cell[data-v="16"]   { background: #f59563; color: #f9f6f2; }
    .cell[data-v="32"]   { background: #f67c5f; color: #f9f6f2; }
    .cell[data-v="64"]   { background: #f65e3b; color: #f9f6f2; }
    .cell[data-v="128"]  { background: #edcf72; color: #f9f6f2; }
    .cell[data-v="256"]  { background: #edcc61; color: #f9f6f2; }
    .cell[data-v="512"]  { background: #edc850; color: #f9f6f2; }
    .cell[data-v="1024"] { background: #edc53f; color: #f9f6f2; }
    .cell[data-v="2048"] { background: #edc22e; color: #f9f6f2; }
    .cell[data-v="4096"] { background: #3c3a32; color: #f9f6f2; }
    .cell[data-v="8192"] { background: #3c3a32; color: #f9f6f2; }

    /* ── Font sizes (responsive) ── */
    .cell[data-v="2"],
    .cell[data-v="4"],
    .cell[data-v="8"]    { font-size: clamp(28px, 8vw, 55px); }

    .cell[data-v="16"],
    .cell[data-v="32"],
    .cell[data-v="64"]   { font-size: clamp(24px, 6.5vw, 44px); }

    .cell[data-v="128"],
    .cell[data-v="256"],
    .cell[data-v="512"]  { font-size: clamp(18px, 5.2vw, 36px); }

    .cell[data-v="1024"],
    .cell[data-v="2048"] { font-size: clamp(15px, 4.2vw, 28px); }

    .cell[data-v="4096"],
    .cell[data-v="8192"] { font-size: clamp(13px, 3.5vw, 22px); }

    /* ── Animations ── */
    @keyframes tile-appear {
      0%   { transform: scale(0.5); opacity: 0; }
      60%  { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); }
    }

    @keyframes tile-merge {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    .cell[data-anim="appear"] { animation: tile-appear 0.14s ease; }
    .cell[data-anim="merge"]  { animation: tile-merge 0.16s ease; }

    /* ── Overlay ── */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(238, 228, 218, 0.76);
      border-radius: 8px;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 20;
    }

    .overlay.show { display: flex; }

    .overlay-msg {
      font-size: clamp(36px, 10vw, 56px);
      font-weight: 700;
      color: #776e65;
    }

    .overlay .btn {
      font-size: 16px;
      padding: 12px 28px;
    }

    /* ── Score banner (post-game) ── */
    #score-banner {
      display: none;
      background: #f3ede6;
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 10px;
      width: 100%;
      max-width: 480px;
      text-align: center;
      font-size: 13px;
      color: #776e65;
      font-weight: 600;
    }
    #score-banner .rank-txt { color: #8f7a66; }
    #score-banner .share-btn {
      background: #8f7a66; color: #fff; border: none;
      border-radius: 4px; padding: 5px 12px; font-size: 12px;
      font-weight: 700; cursor: pointer; margin-left: 10px;
      font-family: inherit; letter-spacing: 0.3px;
    }
    #score-banner .share-btn:hover { background: #7f6a56; }

    /* ── Instructions ── */
    .instructions {
      margin-top: 12px;
      font-size: 14px;
      text-align: center;
      max-width: 480px;
      line-height: 1.7;
    }

    /* ── D-pad ── */
    .dpad {
      display: grid;
      grid-template-areas: ". up ." "left . right" ". down .";
      grid-template-columns: repeat(3, 60px);
      grid-template-rows: repeat(3, 60px);
      gap: 6px;
      margin: 16px auto 0;
    }

    .dpad-btn {
      background: #8f7a66;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s, transform 0.08s;
    }

    .dpad-btn:hover  { background: #7f6a56; }
    .dpad-btn:active { background: #6f5a46; transform: scale(0.92); }

    .dpad-btn[data-dir="up"]    { grid-area: up; }
    .dpad-btn[data-dir="left"]  { grid-area: left; }
    .dpad-btn[data-dir="right"] { grid-area: right; }
    .dpad-btn[data-dir="down"]  { grid-area: down; }
  </style>
</head>
<body>
<a href="index.html" style="position:fixed;top:12px;left:12px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;text-decoration:none;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;z-index:100;">← Games</a>

  <header>
    <div class="title">2048</div>
    <div class="scores">
      <div class="score-box">
        <div class="score-label">Score</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">Best</div>
        <div class="score-value" id="best">0</div>
      </div>
    </div>
  </header>

  <div class="controls">
    <span class="subtitle">Join the tiles — reach&nbsp;<strong>2048!</strong></span>
    <button class="btn" id="btn-new">New Game</button>
  </div>

  <div class="board-wrapper">
    <div class="board" id="board"></div>
    <div class="overlay" id="overlay">
      <div class="overlay-msg" id="overlay-msg">Game Over!</div>
      <button class="btn" id="btn-overlay">Try Again</button>
    </div>
  </div>

  <div id="score-banner"></div>
  <div class="dpad" id="dpad">
    <button class="dpad-btn" data-dir="up">↑</button>
    <button class="dpad-btn" data-dir="left">←</button>
    <button class="dpad-btn" data-dir="right">→</button>
    <button class="dpad-btn" data-dir="down">↓</button>
  </div>

  <p class="instructions">
    Tap the arrows, use <strong>arrow keys</strong>, or <strong>swipe</strong> to move tiles.<br>
    Matching tiles <strong>merge</strong> — reach <strong>2048</strong> to win!
  </p>

  <script>
    // ── State ────────────────────────────────────────────────────────────────
    const ROWS = 4, COLS = 4;
    let grid, score, best, gameOver, won, keepGoing;

    best = parseInt(localStorage.getItem('2048-best') || '0');

    const $score    = document.getElementById('score');
    const $best     = document.getElementById('best');
    const $board    = document.getElementById('board');
    const $overlay  = document.getElementById('overlay');
    const $overlayMsg = document.getElementById('overlay-msg');
    const $btnOverlay = document.getElementById('btn-overlay');

    document.getElementById('btn-new').addEventListener('click', startGame);
    $btnOverlay.addEventListener('click', () => $btnOverlay._action());

    // ── Init ─────────────────────────────────────────────────────────────────
    function startGame() {
      grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
      score = 0;
      gameOver = false;
      won = false;
      keepGoing = false;
      $overlay.classList.remove('show');
      document.getElementById('score-banner').style.display = 'none';
      spawnTile();
      spawnTile();
      render([], []);
      syncScore();
    }

    // ── Tile spawning ─────────────────────────────────────────────────────────
    function spawnTile() {
      const empty = [];
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (grid[r][c] === 0) empty.push([r, c]);
      if (!empty.length) return null;
      const [r, c] = empty[Math.random() * empty.length | 0];
      grid[r][c] = Math.random() < 0.9 ? 2 : 4;
      return [r, c];
    }

    // ── Core slide-and-merge for one line ────────────────────────────────────
    function slideLine(line) {
      const vals = line.filter(v => v !== 0);
      const result = Array(COLS).fill(0);
      const mergedAt = new Set();
      let gained = 0, pos = 0, i = 0;
      while (i < vals.length) {
        if (i + 1 < vals.length && vals[i] === vals[i + 1]) {
          result[pos] = vals[i] * 2;
          mergedAt.add(pos);
          gained += vals[i] * 2;
          i += 2;
        } else {
          result[pos] = vals[i++];
        }
        pos++;
      }
      return { result, mergedAt, gained };
    }

    // ── Move ─────────────────────────────────────────────────────────────────
    function move(dir) {
      if (gameOver) return;

      const before = grid.map(r => [...r]);
      const mergedCells = [];  // [r, c] pairs
      let totalGained = 0;
      let newGrid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));

      if (dir === 'left') {
        for (let r = 0; r < ROWS; r++) {
          const { result, mergedAt, gained } = slideLine(grid[r]);
          totalGained += gained;
          for (let c = 0; c < COLS; c++) {
            newGrid[r][c] = result[c];
            if (mergedAt.has(c)) mergedCells.push([r, c]);
          }
        }
      } else if (dir === 'right') {
        for (let r = 0; r < ROWS; r++) {
          const { result, mergedAt, gained } = slideLine([...grid[r]].reverse());
          result.reverse();
          const rIdx = new Set([...mergedAt].map(c => COLS - 1 - c));
          totalGained += gained;
          for (let c = 0; c < COLS; c++) {
            newGrid[r][c] = result[c];
            if (rIdx.has(c)) mergedCells.push([r, c]);
          }
        }
      } else if (dir === 'up') {
        for (let c = 0; c < COLS; c++) {
          const col = grid.map(r => r[c]);
          const { result, mergedAt, gained } = slideLine(col);
          totalGained += gained;
          for (let r = 0; r < ROWS; r++) {
            newGrid[r][c] = result[r];
            if (mergedAt.has(r)) mergedCells.push([r, c]);
          }
        }
      } else { // down
        for (let c = 0; c < COLS; c++) {
          const col = grid.map(r => r[c]).reverse();
          const { result, mergedAt, gained } = slideLine(col);
          result.reverse();
          const rIdx = new Set([...mergedAt].map(r => ROWS - 1 - r));
          totalGained += gained;
          for (let r = 0; r < ROWS; r++) {
            newGrid[r][c] = result[r];
            if (rIdx.has(r)) mergedCells.push([r, c]);
          }
        }
      }

      // Detect if board changed
      let changed = false;
      for (let r = 0; r < ROWS && !changed; r++)
        for (let c = 0; c < COLS && !changed; c++)
          if (newGrid[r][c] !== before[r][c]) changed = true;
      if (!changed) return;

      grid = newGrid;
      score += totalGained;
      if (score > best) {
        best = score;
        localStorage.setItem('2048-best', best);
      }

      const newPos = spawnTile();
      syncScore();
      render(mergedCells, newPos ? [newPos] : []);

      // Win check
      if (!won && !keepGoing) {
        outer: for (let r = 0; r < ROWS; r++)
          for (let c = 0; c < COLS; c++)
            if (grid[r][c] === 2048) { won = true; break outer; }
      }

      if (won && !keepGoing) {
        setTimeout(() => {
          saveAndShare(score);
          $overlayMsg.textContent = '🎉 You Win!';
          $btnOverlay.textContent = 'Keep Going';
          $btnOverlay._action = () => {
            keepGoing = true;
            $overlay.classList.remove('show');
            $btnOverlay.textContent = 'Try Again';
            $btnOverlay._action = startGame;
          };
          $overlay.classList.add('show');
        }, 200);
        return;
      }

      if (noMovesLeft()) {
        setTimeout(() => {
          gameOver = true;
          saveAndShare(score);
          $overlayMsg.textContent = 'Game Over!';
          $btnOverlay.textContent = 'Try Again';
          $btnOverlay._action = startGame;
          $overlay.classList.add('show');
        }, 200);
      }
    }

    function noMovesLeft() {
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++) {
          if (grid[r][c] === 0) return false;
          if (r + 1 < ROWS && grid[r][c] === grid[r + 1][c]) return false;
          if (c + 1 < COLS && grid[r][c] === grid[r][c + 1]) return false;
        }
      return true;
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function render(mergedCells, newCells) {
      const mergeSet = new Set(mergedCells.map(([r, c]) => `${r},${c}`));
      const newSet   = new Set(newCells.map(([r, c]) => `${r},${c}`));
      $board.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const v = grid[r][c];
          const el = document.createElement('div');
          el.className = 'cell';
          if (v !== 0) {
            el.setAttribute('data-v', v);
            el.textContent = v;
            const key = `${r},${c}`;
            if (mergeSet.has(key)) el.setAttribute('data-anim', 'merge');
            else if (newSet.has(key)) el.setAttribute('data-anim', 'appear');
          }
          $board.appendChild(el);
        }
      }
    }

    function syncScore() {
      $score.textContent = score;
      $best.textContent  = best;
    }

    function saveAndShare(finalScore) {
      const banner = document.getElementById('score-banner');
      if (!window.lb) { banner.style.display = 'none'; return; }
      const rank = window.lb.save('2048', finalScore);
      const rankTxt = rank ? ` &nbsp;·&nbsp; <span class="rank-txt">🏆 Rank #${rank}</span>` : '';
      const user = window.auth?.user?.name || '';
      const shareText = `${user ? user + ' scored ' : 'I scored '}${finalScore.toLocaleString()} in 2048!`;
      banner.innerHTML = `Score: <strong>${finalScore.toLocaleString()}</strong>${rankTxt}` +
        `<button id="share-btn" class="share-btn" onclick="window.shareScore('${shareText.replace(/'/g,"\\'")}')">🔗 Share</button>`;
      banner.style.display = 'block';
    }

    // ── Keyboard ──────────────────────────────────────────────────────────────
    const KEY_MAP = {
      ArrowLeft: 'left', ArrowRight: 'right',
      ArrowUp: 'up', ArrowDown: 'down',
    };
    document.addEventListener('keydown', e => {
      const dir = KEY_MAP[e.key];
      if (dir) { e.preventDefault(); move(dir); }
    });

    // ── Touch / Swipe ─────────────────────────────────────────────────────────
    let t0 = null;
    document.addEventListener('touchstart', e => {
      t0 = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }, { passive: true });
    document.addEventListener('touchmove', e => {
      if (t0) e.preventDefault();
    }, { passive: false });
    document.addEventListener('touchend', e => {
      if (!t0) return;
      const dx = e.changedTouches[0].clientX - t0.x;
      const dy = e.changedTouches[0].clientY - t0.y;
      t0 = null;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
      if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
      else move(dy > 0 ? 'down' : 'up');
    });

    // ── D-pad buttons ─────────────────────────────────────────────────────────
    document.getElementById('dpad').addEventListener('click', e => {
      const btn = e.target.closest('[data-dir]');
      if (btn) move(btn.dataset.dir);
    });

    // ── Start ─────────────────────────────────────────────────────────────────
    $best.textContent = best;
    $btnOverlay._action = startGame;
    startGame();
  </script>
</body>
</html>
