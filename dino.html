<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#1a1a2e"/>
  <title>Dino Escape</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      padding: 10px 16px 40px;
      user-select: none; -webkit-user-select: none;
    }
    a.back {
      position: fixed; top: 12px; left: 12px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff; text-decoration: none;
      padding: 6px 14px; border-radius: 8px;
      font-size: 13px; font-weight: 600; z-index: 100;
    }
    h1 {
      font-size: clamp(20px, 5vw, 28px); font-weight: 800;
      background: linear-gradient(90deg, #4ade80, #86efac, #fbbf24);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 4px 0 6px;
    }
    .topbar {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 6px; width: 100%; max-width: 420px;
      justify-content: space-between;
    }
    .badge {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 4px 14px;
      font-size: 13px; font-weight: 600;
    }
    .rbtn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff; border-radius: 8px;
      padding: 5px 12px; font-size: 12px;
      font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .rbtn:hover { background: rgba(255,255,255,0.15); }
    canvas {
      border-radius: 16px; display: block;
      cursor: pointer; touch-action: none;
      border: 1px solid rgba(255,255,255,0.07);
    }
    .hint { margin-top: 10px; font-size: 12px; opacity: 0.38; text-align: center; }
  </style>
</head>
<body>
<a class="back" href="index.html">← Games</a>
<h1>🦖 Dino Escape</h1>
<div class="topbar">
  <span class="badge" id="lvl-badge">Level 1 / 5</span>
  <button class="rbtn" id="restart">↺ Restart</button>
</div>
<canvas id="canvas"></canvas>
<p class="hint" id="hint">Tap the glowing bolt rings to pull them out!</p>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const CW = 380, CH = 520;
let scale = 1;
function resize() {
  const avail = Math.min(window.innerWidth - 32, 440);
  scale = Math.min(avail / CW, 1.4);
  canvas.width  = CW * scale;
  canvas.height = CH * scale;
  ctx.setTransform(scale, 0, 0, scale, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ── helpers ──────────────────────────────────────────────────────────────────
function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ── SCENE LAYOUT ─────────────────────────────────────────────────────────────
// Dino is pinned to a stone floor. Metal bolts nail it through anchor rings.
// Each bolt = { id, ax,ay (anchor point on dino), dir:'L'|'R'|'U'|'D', req:[] }
// Pulling slides the bolt out in the given direction.

const DINO_X = CW/2, DINO_Y = CH/2 - 30;  // dino center

// Anchor offsets from dino center (body landmarks)
const A = {
  neckL:   { dx:-70, dy:-60 },   // left side of neck
  neckR:   { dx: 70, dy:-60 },   // right side
  shoulderL:{ dx:-90, dy:-10 },  // left shoulder
  shoulderR:{ dx: 90, dy:-10 },  // right shoulder
  hipL:    { dx:-80, dy: 50 },   // left hip
  hipR:    { dx: 80, dy: 50 },   // right hip
  tailL:   { dx:-90, dy: 80 },   // tail left bolt
  tailR:   { dx: 90, dy: 80 },   // tail right bolt
};

function anchor(key){ return { ax: DINO_X+A[key].dx, ay: DINO_Y+A[key].dy }; }

// Level definitions
const LEVELS = [
  // 1 — 2 bolts, tutorial
  { hint:'Pull the glowing bolts to free the dino!', pins:[
    { id:0, ...anchor('shoulderL'), dir:'L', req:[] },
    { id:1, ...anchor('shoulderR'), dir:'R', req:[] },
  ]},
  // 2 — 4 bolts, neck before hips
  { hint:'Neck bolts must come out first!', pins:[
    { id:0, ...anchor('neckL'),    dir:'L', req:[] },
    { id:1, ...anchor('neckR'),    dir:'R', req:[] },
    { id:2, ...anchor('hipL'),     dir:'L', req:[0] },
    { id:3, ...anchor('hipR'),     dir:'R', req:[1] },
  ]},
  // 3 — 5 bolts, shoulders unlock hips, then tail
  { hint:'Work from top to bottom!', pins:[
    { id:0, ...anchor('shoulderL'), dir:'L', req:[] },
    { id:1, ...anchor('shoulderR'), dir:'R', req:[] },
    { id:2, ...anchor('hipL'),      dir:'L', req:[0] },
    { id:3, ...anchor('hipR'),      dir:'R', req:[1] },
    { id:4, ...anchor('tailL'),     dir:'D', req:[2,3] },
  ]},
  // 4 — 6 bolts with cross-dependency
  { hint:'Some bolts need two others free first!', pins:[
    { id:0, ...anchor('neckL'),     dir:'U', req:[] },
    { id:1, ...anchor('neckR'),     dir:'U', req:[] },
    { id:2, ...anchor('shoulderL'), dir:'L', req:[0] },
    { id:3, ...anchor('shoulderR'), dir:'R', req:[1] },
    { id:4, ...anchor('tailL'),     dir:'L', req:[2,3] },
    { id:5, ...anchor('tailR'),     dir:'R', req:[2,3] },
  ]},
  // 5 — 8 bolts, full chain
  { hint:'Final challenge — think it through!', pins:[
    { id:0, ...anchor('neckL'),      dir:'L', req:[] },
    { id:1, ...anchor('neckR'),      dir:'R', req:[] },
    { id:2, ...anchor('shoulderL'),  dir:'L', req:[0] },
    { id:3, ...anchor('shoulderR'),  dir:'R', req:[1] },
    { id:4, ...anchor('hipL'),       dir:'L', req:[2] },
    { id:5, ...anchor('hipR'),       dir:'R', req:[3] },
    { id:6, ...anchor('tailL'),      dir:'D', req:[4,5] },
    { id:7, ...anchor('tailR'),      dir:'D', req:[4,5] },
  ]},
];

// ── BOLT GEOMETRY ─────────────────────────────────────────────────────────────
const BOLT_LEN   = 68;  // rod length
const BOLT_R     = 6;   // rod radius
const RING_R     = 18;  // ring outer radius
const PULL_DIST  = 110; // total extraction distance

function boltGeom(pin){
  const p = pin.prog * PULL_DIST;
  const { ax, ay, dir } = pin;
  let dx=0, dy=0;
  if(dir==='L') dx=-1; if(dir==='R') dx=1;
  if(dir==='U') dy=-1; if(dir==='D') dy=1;
  // near end (outside, where ring is)
  const nx = ax + dx*(BOLT_LEN/2 + p);
  const ny = ay + dy*(BOLT_LEN/2 + p);
  // far end (inside body)
  const fx = ax - dx*(BOLT_LEN/2 - p);
  const fy = ay - dy*(BOLT_LEN/2 - p);
  // ring center (at near end)
  const rx = ax + dx*(BOLT_LEN/2 + RING_R*0.5 + p);
  const ry = ay + dy*(BOLT_LEN/2 + RING_R*0.5 + p);
  return { nx,ny,fx,fy,rx,ry,dx,dy };
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let pins=[], particles=[], levelIdx=0;
let phase='play', breakProg=0, dinoFrame=0;
let hoverPin=null;

function loadLevel(idx){
  levelIdx = idx;
  pins = LEVELS[idx].pins.map(p=>({...p, pulled:false, prog:0, animating:false}));
  particles=[]; phase='play'; breakProg=0; hoverPin=null;
  document.getElementById('lvl-badge').textContent = `Level ${idx+1} / ${LEVELS.length}`;
  document.getElementById('hint').textContent = LEVELS[idx].hint;
}

function isFree(pin){
  return !pin.pulled && !pin.animating &&
    pin.req.every(id => pins.find(p=>p.id===id)?.pulled);
}

// ── DRAWING ───────────────────────────────────────────────────────────────────
function drawBG(){
  // Stone/dungeon floor
  const g = ctx.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,'#141b2d'); g.addColorStop(1,'#0a0f1a');
  ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH);

  // Stone tile grid
  ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1;
  for(let x=0;x<CW;x+=50){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,CH); ctx.stroke(); }
  for(let y=0;y<CH;y+=50){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(CW,y); ctx.stroke(); }

  // Central platform
  const px=CW/2-130, py=DINO_Y-120, pw=260, ph=320;
  const pg = ctx.createLinearGradient(px,py,px,py+ph);
  pg.addColorStop(0,'rgba(60,50,30,0.7)'); pg.addColorStop(1,'rgba(30,25,15,0.7)');
  rrect(px,py,pw,ph,12); ctx.fillStyle=pg; ctx.fill();
  ctx.strokeStyle='rgba(150,110,50,0.3)'; ctx.lineWidth=1.5; ctx.stroke();

  // Wood grain lines on platform
  ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=1;
  for(let gy=py+10;gy<py+ph-10;gy+=18){
    ctx.beginPath(); ctx.moveTo(px+6,gy); ctx.lineTo(px+pw-6,gy); ctx.stroke();
  }
}

function drawDino(freed){
  ctx.save();
  if(freed){
    const bounce = Math.sin(dinoFrame*0.13)*18;
    const spin   = Math.sin(dinoFrame*0.09)*0.25;
    ctx.translate(DINO_X, DINO_Y - 20 + bounce);
    ctx.rotate(spin);
  } else {
    ctx.translate(DINO_X, DINO_Y);
    // Shake slightly when all bolts are being removed
    const remaining = pins.filter(p=>!p.pulled).length;
    if(remaining <= 1 && phase==='play'){
      ctx.translate(Math.sin(dinoFrame*0.4)*2, 0);
    }
  }
  ctx.font='90px serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';

  // Shadow under dino
  ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=20; ctx.shadowOffsetY=8;
  ctx.fillText('🦖', 0, 0);
  ctx.shadowBlur=0; ctx.shadowOffsetY=0;
  ctx.restore();
}

function drawBolt(pin){
  if(pin.pulled && pin.prog>=1) return;
  const free = isFree(pin);
  const hov  = free && pin===hoverPin;
  const { nx,ny,fx,fy,rx,ry,dx,dy } = boltGeom(pin);

  ctx.save();

  // ── Rod ──────────────────────────────────────────────────────────────────
  const horiz = (pin.dir==='L'||pin.dir==='R');
  const rodLen = Math.hypot(nx-fx, ny-fy);

  // Draw rod as thick line
  ctx.lineCap='round';
  ctx.lineWidth = BOLT_R*2;

  const rodGrad = horiz
    ? ctx.createLinearGradient(fx,fy-BOLT_R,fx,fy+BOLT_R)
    : ctx.createLinearGradient(fx-BOLT_R,fy,fx+BOLT_R,fy);

  if(free){
    rodGrad.addColorStop(0,'#9ca3af');
    rodGrad.addColorStop(0.4,'#e2e8f0');
    rodGrad.addColorStop(0.6,'#d1d5db');
    rodGrad.addColorStop(1,'#6b7280');
  } else {
    rodGrad.addColorStop(0,'#374151');
    rodGrad.addColorStop(0.5,'#4b5563');
    rodGrad.addColorStop(1,'#1f2937');
  }

  if(free){ ctx.shadowColor=hov?'rgba(251,191,36,0.7)':'rgba(251,191,36,0.3)'; ctx.shadowBlur=hov?20:10; }

  ctx.strokeStyle = rodGrad;
  ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(nx,ny); ctx.stroke();

  // Thread grooves
  if(free){
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=1.5;
    const steps = Math.floor(rodLen/10);
    for(let i=1;i<steps;i++){
      const t=i/steps;
      const gx=fx+dx*t*rodLen*(-1), gy=fy+dy*t*rodLen*(-1);
      // perpendicular tick
      ctx.beginPath();
      ctx.moveTo(gx-dy*BOLT_R, gy+dx*BOLT_R);
      ctx.lineTo(gx+dy*BOLT_R, gy-dx*BOLT_R);
      ctx.stroke();
    }
  }

  // Anchor plate (where bolt goes through platform)
  ctx.shadowBlur=0;
  const plateCol = free ? '#78716c' : '#3f3f46';
  ctx.fillStyle = plateCol;
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth=1;
  if(horiz){
    rrect(pin.ax-5, pin.ay-BOLT_R-4, 10, BOLT_R*2+8, 3);
  } else {
    rrect(pin.ax-BOLT_R-4, pin.ay-5, BOLT_R*2+8, 10, 3);
  }
  ctx.fill(); ctx.stroke();

  // ── Ring handle ──────────────────────────────────────────────────────────
  ctx.shadowColor = free ? (hov ? '#fbbf24' : 'rgba(251,191,36,0.5)') : 'transparent';
  ctx.shadowBlur  = free ? (hov ? 24 : 12) : 0;

  const ringFill = ctx.createRadialGradient(rx-RING_R*0.3,ry-RING_R*0.3,RING_R*0.1,rx,ry,RING_R);
  if(free){
    ringFill.addColorStop(0, hov?'#fde68a':'#fcd34d');
    ringFill.addColorStop(1, hov?'#f59e0b':'#d97706');
  } else {
    ringFill.addColorStop(0,'#52525b');
    ringFill.addColorStop(1,'#27272a');
  }

  // Ring body
  ctx.beginPath(); ctx.arc(rx,ry,RING_R,0,Math.PI*2);
  ctx.fillStyle=ringFill; ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=2; ctx.stroke();

  // Inner hole
  ctx.globalCompositeOperation='destination-out';
  ctx.beginPath(); ctx.arc(rx,ry,RING_R*0.52,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,1)'; ctx.fill();
  ctx.globalCompositeOperation='source-over';

  // Re-draw ring border to clean up
  ctx.beginPath(); ctx.arc(rx,ry,RING_R,0,Math.PI*2);
  ctx.strokeStyle=free?(hov?'#fbbf24':'#f59e0b'):'#3f3f46';
  ctx.lineWidth=2.5; ctx.stroke();

  ctx.shadowBlur=0;

  // Arrow indicator on free bolts
  if(free){
    const arrowX = rx + dx*26, arrowY = ry + dy*26;
    ctx.fillStyle = hov ? '#fbbf24' : 'rgba(251,191,36,0.7)';
    ctx.font = '16px serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const arrows = { L:'←', R:'→', U:'↑', D:'↓' };
    ctx.fillText(arrows[pin.dir], arrowX, arrowY);
  }

  // Lock icon for locked bolts
  if(!free && !pin.pulled){
    ctx.fillStyle='rgba(255,255,255,0.25)';
    ctx.font='11px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowBlur=0;
    ctx.fillText('🔒', rx, ry+1);
  }

  ctx.restore();
}

// ── PARTICLES ─────────────────────────────────────────────────────────────────
function addSparks(x,y){
  const cols=['#fbbf24','#f97316','#ef4444','#fde68a'];
  for(let i=0;i<14;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,
      r:1.5+Math.random()*3, color:cols[i%cols.length], life:1, decay:0.04+Math.random()*0.04});
  }
}
function addConfetti(){
  const cols=['#4ade80','#ffd166','#ff6b6b','#4cc9f0','#a78bfa','#fbbf24'];
  for(let i=0;i<70;i++){
    const a=Math.random()*Math.PI*2, s=3+Math.random()*8;
    particles.push({x:CW/2,y:CH/2,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,
      r:2+Math.random()*6, color:cols[i%cols.length], life:1, decay:0.018+Math.random()*0.018});
  }
}
function tickParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.25; p.life-=p.decay;
    if(p.life<=0) particles.splice(i,1);
  }
}
function drawParticles(){
  for(const p of particles){
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ── WIN OVERLAY ───────────────────────────────────────────────────────────────
function drawWinOverlay(){
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,CW,CH);
  ctx.textAlign='center'; ctx.textBaseline='middle';

  ctx.font='bold 36px system-ui';
  ctx.fillStyle='#4ade80';
  ctx.shadowColor='#4ade80'; ctx.shadowBlur=20;
  ctx.fillText('🎉 Dino Freed!', CW/2, CH/2-62);
  ctx.shadowBlur=0;

  const last = levelIdx>=LEVELS.length-1;
  ctx.font='16px system-ui'; ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fillText(last?'🏆 You beat all 5 levels!':`Level ${levelIdx+1} complete!`, CW/2, CH/2-22);

  const bx=CW/2-80, by=CH/2+4, bw=160, bh=46;
  const bg=ctx.createLinearGradient(bx,by,bx+bw,by);
  bg.addColorStop(0,'#4ade80'); bg.addColorStop(1,'#22d3ee');
  rrect(bx,by,bw,bh,23); ctx.fillStyle=bg; ctx.fill();

  ctx.font='bold 15px system-ui'; ctx.fillStyle='#0a1f0a';
  ctx.fillText(last?'▶ Play Again':`▶ Next Level`, CW/2, by+bh/2+1);
  ctx.restore();
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
function loop(){
  dinoFrame++;

  // Animate bolt pulling
  for(const pin of pins){
    if(pin.animating){
      pin.prog = Math.min(1, pin.prog+0.055);
      if(pin.prog>=1){ pin.animating=false; pin.pulled=true; }
    }
  }

  // All bolts removed → celebrate
  if(phase==='play' && pins.every(p=>p.pulled)){
    phase='win';
    addConfetti();
  }

  tickParticles();

  // Draw
  drawBG();
  drawDino(phase==='win');
  if(phase==='play') for(const pin of pins) drawBolt(pin);
  drawParticles();
  if(phase==='win') drawWinOverlay();

  requestAnimationFrame(loop);
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
function toGame(cx,cy){
  const r=canvas.getBoundingClientRect();
  return {gx:(cx-r.left)/scale, gy:(cy-r.top)/scale};
}
function hitBolt(gx,gy){
  for(const pin of pins){
    if(pin.pulled||pin.animating) continue;
    const {rx,ry}=boltGeom(pin);
    if(Math.hypot(rx-gx,ry-gy)<RING_R+12) return pin;
  }
  return null;
}

canvas.addEventListener('mousemove', e=>{
  const {gx,gy}=toGame(e.clientX,e.clientY);
  const h=hitBolt(gx,gy);
  hoverPin=(h&&isFree(h))?h:null;
  canvas.style.cursor=hoverPin?'grab':'default';
});

function handleTap(cx,cy){
  const {gx,gy}=toGame(cx,cy);
  if(phase==='win'){
    const bx=CW/2-80,by=CH/2+4,bw=160,bh=46;
    if(gx>bx&&gx<bx+bw&&gy>by&&gy<by+bh){
      loadLevel(levelIdx>=LEVELS.length-1?0:levelIdx+1);
    }
    return;
  }
  const pin=hitBolt(gx,gy);
  if(pin&&isFree(pin)){
    pin.animating=true;
    addSparks(pin.ax,pin.ay);
  }
}

canvas.addEventListener('click', e=>handleTap(e.clientX,e.clientY));
canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  handleTap(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
},{passive:false});

document.getElementById('restart').addEventListener('click',()=>loadLevel(levelIdx));

loadLevel(0);
requestAnimationFrame(loop);
</script>
</body>
</html>
