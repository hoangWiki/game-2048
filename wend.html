<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#121213"/>
<title>Wend</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#121213;min-height:100vh;display:flex;flex-direction:column;align-items:center;
  font-family:'Segoe UI',system-ui,sans-serif;color:#fff;user-select:none;-webkit-user-select:none;
  padding:0 8px 20px}
a.back{position:fixed;top:10px;left:10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:#fff;text-decoration:none;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;z-index:100}
h1{font-size:22px;font-weight:800;letter-spacing:3px;text-transform:uppercase;padding:38px 0 4px;
  background:linear-gradient(90deg,#4cc9f0,#a78bfa);-webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent}
#msg{height:26px;font-size:13px;font-weight:600;text-align:center;color:#fff;opacity:.85;line-height:26px;margin-bottom:6px}
#board{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.row{display:flex;gap:5px}
.tile{width:clamp(46px,12vw,54px);height:clamp(46px,12vw,54px);display:flex;align-items:center;justify-content:center;
  border:2px solid rgba(255,255,255,.18);border-radius:4px;font-size:clamp(18px,5vw,22px);
  font-weight:800;text-transform:uppercase;transition:background .25s,border-color .25s}
.tile.filled{border-color:rgba(255,255,255,.5)}
.tile.green{background:#538d4e;border-color:#538d4e}
.tile.yellow{background:#b59f3b;border-color:#b59f3b}
.tile.gray{background:#3a3a3c;border-color:#3a3a3c}
.tile.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
#keyboard{display:flex;flex-direction:column;gap:6px;width:min(340px,96vw)}
.kb-row{display:flex;gap:4px;justify-content:center}
.key{flex:1;max-width:40px;min-width:24px;height:54px;background:#818384;border:none;border-radius:5px;
  color:#fff;font-size:12px;font-weight:700;cursor:pointer;text-transform:uppercase;font-family:inherit;
  transition:background .2s;touch-action:manipulation}
.key.wide{max-width:60px;min-width:40px;font-size:10px}
.key.green{background:#538d4e}
.key.yellow{background:#b59f3b}
.key.gray{background:#3a3a3c}
.key:active{filter:brightness(1.3)}
</style>
</head>
<body>
<a class="back" href="index.html">← Games</a>
<h1>⬛ Wend</h1>
<div id="msg"></div>
<div id="board"></div>
<div id="keyboard"></div>
<script>
const WORDS=['CRANE','FLUTE','BRAVE','STORM','PIANO','CLOUD','FLAME','GRAPE','TIGER','OCEAN',
'DANCE','EARTH','FROST','GLOBE','HONEY','IVORY','JEWEL','KNEEL','LEMON','MAPLE',
'NIGHT','OLIVE','PEARL','QUEST','RIVER','SOLAR','THINK','UNDER','VENUS','WITCH',
'BLAZE','CHECK','DERBY','EVERY','FUNNY','GHOST','HABIT','INPUT','JOKER','KNACK',
'LIGHT','MUSIC','NOBLE','OZONE','PATCH','QUIET','ROUGH','SPEED','TRICK','USUAL',
'VALID','WATER','EXTRA','YOUNG','ZEBRA','PLUMB','CRISP','DWARF','EXILE','GLOOM'];

const DAY=Math.floor(Date.now()/864e5);
const TARGET=WORDS[DAY%WORDS.length];
let guesses=[],cur=[],over=false;

// Build board
const boardEl=document.getElementById('board');
const tiles=[];
for(let r=0;r<6;r++){
  const row=document.createElement('div');row.className='row';
  tiles[r]=[];
  for(let c=0;c<5;c++){
    const t=document.createElement('div');t.className='tile';
    row.appendChild(t);tiles[r][c]=t;
  }
  boardEl.appendChild(row);
}

// Build keyboard
const ROWS=[['q','w','e','r','t','y','u','i','o','p'],
            ['a','s','d','f','g','h','j','k','l'],
            ['Enter','z','x','c','v','b','n','m','⌫']];
const keyEls={};
const kbEl=document.getElementById('keyboard');
for(const row of ROWS){
  const d=document.createElement('div');d.className='kb-row';
  for(const k of row){
    const b=document.createElement('button');b.className='key';
    if(k.length>1)b.classList.add('wide');
    b.textContent=k;b.dataset.k=k;
    b.addEventListener('pointerdown',e=>{e.preventDefault();press(k);});
    d.appendChild(b);keyEls[k]=b;
  }
  kbEl.appendChild(d);
}

function showMsg(t,ms=1500){
  const el=document.getElementById('msg');el.textContent=t;
  if(ms)setTimeout(()=>{if(el.textContent===t)el.textContent='';},ms);
}

function score(g,t){
  const res=Array(5).fill('gray'),left=[...t];
  for(let i=0;i<5;i++)if(g[i]===t[i]){res[i]='green';left[i]=null;}
  for(let i=0;i<5;i++){if(res[i]==='green')continue;const j=left.indexOf(g[i]);if(j!==-1){res[i]='yellow';left[j]=null;}}
  return res;
}

function submit(){
  const r=guesses.length;
  if(cur.length!==5){tiles[r].forEach(t=>{t.classList.add('shake');setTimeout(()=>t.classList.remove('shake'),400);});showMsg('Need 5 letters');return;}
  const g=cur.join(''),colors=score(g,TARGET);
  cur.forEach((ch,i)=>{tiles[r][i].textContent=ch;tiles[r][i].className='tile '+colors[i];});
  cur.forEach((ch,i)=>{
    const k=ch.toLowerCase(),b=keyEls[k]||keyEls[ch];
    if(!b)return;const c=colors[i];
    if(c==='green')b.className='key green';
    else if(c==='yellow'&&!b.classList.contains('green'))b.className='key yellow';
    else if(c==='gray'&&!b.classList.contains('green')&&!b.classList.contains('yellow'))b.className='key gray';
  });
  guesses.push(g);cur=[];
  if(g===TARGET){over=true;showMsg('🎉 Brilliant!',4000);}
  else if(guesses.length===6){over=true;showMsg('Answer: '+TARGET,0);}
}

function press(k){
  if(over)return;
  const r=guesses.length;
  if(k==='Enter')return submit();
  if(k==='⌫'||k==='Backspace'){
    if(cur.length){cur.pop();tiles[r][cur.length].textContent='';tiles[r][cur.length].className='tile';}
    return;
  }
  const ch=k.replace(/[^a-zA-Z]/,'').toUpperCase();
  if(ch.length===1&&cur.length<5){
    cur.push(ch);tiles[r][cur.length-1].textContent=ch;tiles[r][cur.length-1].className='tile filled';
  }
}

document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  if(e.key==='Enter')press('Enter');
  else if(e.key==='Backspace')press('⌫');
  else if(/^[a-zA-Z]$/.test(e.key))press(e.key);
});
</script>
</body>
</html>
