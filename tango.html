<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0f0f1a"/>
<title>Tango</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f1a;min-height:100vh;display:flex;flex-direction:column;align-items:center;
  font-family:'Segoe UI',system-ui,sans-serif;color:#fff;padding:8px 12px 32px;
  user-select:none;-webkit-user-select:none}
a.back{position:fixed;top:12px;left:12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:#fff;text-decoration:none;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;z-index:100}
h1{font-size:clamp(20px,5vw,26px);font-weight:800;
  background:linear-gradient(90deg,#fde68a,#f59e0b);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin:2px 0 8px}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:8px;width:100%;max-width:440px;justify-content:space-between}
.badge{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:4px 14px;font-size:13px;font-weight:600}
.rbtn{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:#f59e0b;
  border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.rbtn:hover{background:rgba(245,158,11,.25)}
canvas{border-radius:16px;display:block;touch-action:none;border:1px solid rgba(255,255,255,.07)}
.hint{margin-top:10px;font-size:12px;opacity:.38;text-align:center}
</style>
</head>
<body>
<a class="back" href="index.html">← Games</a>
<h1>☀️ Tango</h1>
<div class="topbar">
  <span class="badge" id="badge">New Puzzle</span>
  <button class="rbtn" id="newbtn">New Puzzle</button>
</div>
<canvas id="canvas"></canvas>
<p class="hint">Tap: empty → ☀ → 🌙 · Equal counts per row &amp; col · No 3 in a row</p>
<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const N=6,CW=384,CH=440;
let scale=1;
function resize(){
  const a=Math.min(window.innerWidth-24,460);
  scale=a/CW;canvas.width=CW*scale;canvas.height=CH*scale;
  ctx.setTransform(scale,0,0,scale,0,0);
}
resize();window.addEventListener('resize',resize);

const SUN=1,MOON=2;
const CS=Math.floor((CW-32)/N); // cell size ~59
const OX=Math.floor((CW-N*CS)/2);
const OY=16;

let solution,puzzle,marks,given,constraints,conflicts,won,winAnim=0;

function genSolution(){
  const g=Array.from({length:N},()=>new Array(N).fill(0));
  function ok(r,c,v){
    let rc=0,cc=0;
    for(let i=0;i<N;i++){if(g[r][i]===v)rc++;if(g[i][c]===v)cc++;}
    if(rc>=N/2||cc>=N/2)return false;
    if(c>=2&&g[r][c-1]===v&&g[r][c-2]===v)return false;
    if(r>=2&&g[r-1][c]===v&&g[r-2][c]===v)return false;
    return true;
  }
  function bt(pos){
    if(pos===N*N)return true;
    const r=pos/N|0,c=pos%N;
    const vs=Math.random()>.5?[SUN,MOON]:[MOON,SUN];
    for(const v of vs){if(ok(r,c,v)){g[r][c]=v;if(bt(pos+1))return true;g[r][c]=0;}}
    return false;
  }
  return bt(0)?g:null;
}

function newPuzzle(){
  let sol=null;for(let i=0;i<20;i++){sol=genSolution();if(sol)break;}
  if(!sol)return;
  solution=sol;
  puzzle=sol.map(r=>[...r]);
  // Add constraints (6-8 adjacent pairs)
  const pairs=[];
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    if(c+1<N)pairs.push([r,c,r,c+1,'H']);
    if(r+1<N)pairs.push([r,c,r+1,c,'V']);
  }
  for(let i=pairs.length-1;i>0;i--){const j=0|Math.random()*(i+1);[pairs[i],pairs[j]]=[pairs[j],pairs[i]];}
  constraints=pairs.slice(0,7).map(([r1,c1,r2,c2,d])=>({r1,c1,r2,c2,d,type:sol[r1][c1]===sol[r2][c2]?'=':'×'}));
  // Remove ~60% of cells (keep ~14 given)
  const cells=[];
  for(let r=0;r<N;r++)for(let c=0;c<N;c++)cells.push([r,c]);
  for(let i=cells.length-1;i>0;i--){const j=0|Math.random()*(i+1);[cells[i],cells[j]]=[cells[j],cells[i]];}
  for(let i=0;i<22;i++){const[r,c]=cells[i];puzzle[r][c]=0;}
  given=puzzle.map(r=>[...r]);
  marks=puzzle.map(r=>[...r]);
  conflicts=new Set();won=false;winAnim=0;
  document.getElementById('badge').textContent='6×6 Puzzle';
}

function calcConflicts(){
  const s=new Set();
  for(let r=0;r<N;r++){
    let sc=0,mc=0;
    for(let c=0;c<N;c++){if(marks[r][c]===SUN)sc++;if(marks[r][c]===MOON)mc++;}
    if(sc>N/2||mc>N/2)for(let c=0;c<N;c++)if(marks[r][c])s.add(r*N+c);
    for(let c=0;c<N-2;c++)if(marks[r][c]&&marks[r][c]===marks[r][c+1]&&marks[r][c]===marks[r][c+2])
      {s.add(r*N+c);s.add(r*N+c+1);s.add(r*N+c+2);}
  }
  for(let c=0;c<N;c++){
    let sc=0,mc=0;
    for(let r=0;r<N;r++){if(marks[r][c]===SUN)sc++;if(marks[r][c]===MOON)mc++;}
    if(sc>N/2||mc>N/2)for(let r=0;r<N;r++)if(marks[r][c])s.add(r*N+c);
    for(let r=0;r<N-2;r++)if(marks[r][c]&&marks[r][c]===marks[r+1][c]&&marks[r][c]===marks[r+2][c])
      {s.add(r*N+c);s.add((r+1)*N+c);s.add((r+2)*N+c);}
  }
  // Constraint conflicts
  for(const{r1,c1,r2,c2,type}of constraints){
    if(!marks[r1][c1]||!marks[r2][c2])continue;
    const same=marks[r1][c1]===marks[r2][c2];
    if((type==='='&&!same)||(type==='×'&&same)){s.add(r1*N+c1);s.add(r2*N+c2);}
  }
  return s;
}

function checkWin(){
  for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(!marks[r][c])return false;
  return calcConflicts().size===0;
}

function draw(){
  ctx.fillStyle='#0f0f1a';ctx.fillRect(0,0,CW,CH);

  for(let r=0;r<N;r++){
    for(let c=0;c<N;c++){
      const x=OX+c*CS,y=OY+r*CS;
      const isGiven=given[r][c]!==0;
      const isErr=conflicts.has(r*N+c);
      ctx.fillStyle=isErr?'rgba(255,60,60,.22)':isGiven?'rgba(255,255,255,.07)':'rgba(255,255,255,.03)';
      ctx.fillRect(x+1,y+1,CS-2,CS-2);
      ctx.strokeStyle=isErr?'rgba(255,100,100,.6)':'rgba(255,255,255,.14)';
      ctx.lineWidth=isErr?1.5:1;ctx.strokeRect(x+.5,y+.5,CS-1,CS-1);
      if(marks[r][c]){
        ctx.textAlign='center';ctx.textBaseline='middle';
        const fs=Math.min(CS*.52,28);ctx.font=`${fs}px serif`;
        ctx.fillText(marks[r][c]===SUN?'☀️':'🌙',x+CS/2,y+CS/2+1);
      }
    }
  }
  // Outer border
  ctx.strokeStyle='rgba(245,158,11,.4)';ctx.lineWidth=2;
  ctx.strokeRect(OX,OY,N*CS,N*CS);

  // Constraints
  for(const{r1,c1,r2,c2,d,type}of constraints){
    const mx=OX+c1*CS+(d==='H'?CS:CS/2);
    const my=OY+r1*CS+(d==='H'?CS/2:CS);
    ctx.fillStyle='#0f0f1a';
    ctx.beginPath();ctx.arc(mx,my,10,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.45)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='bold 11px system-ui';ctx.fillStyle='#fff';
    ctx.fillText(type,mx,my+.5);
  }

  // Progress bar
  let filled=0;
  for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(marks[r][c])filled++;
  const pct=filled/(N*N);
  const bx=OX,by=OY+N*CS+14,bw=N*CS,bh=5;
  ctx.fillStyle='rgba(255,255,255,.1)';ctx.beginPath();ctx.roundRect(bx,by,bw,bh,3);ctx.fill();
  const g2=ctx.createLinearGradient(bx,0,bx+bw*pct,0);
  g2.addColorStop(0,'#f59e0b');g2.addColorStop(1,'#fde68a');
  ctx.fillStyle=g2;ctx.beginPath();ctx.roundRect(bx,by,bw*pct,bh,3);ctx.fill();

  // Win overlay
  if(won){
    winAnim=Math.min(winAnim+.04,1);
    ctx.fillStyle=`rgba(0,0,0,${.6*winAnim})`;ctx.fillRect(0,0,CW,CH);
    if(winAnim>.4){
      const a=(winAnim-.4)/.6;ctx.globalAlpha=a;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.font='bold 38px system-ui';ctx.shadowColor='#f59e0b';ctx.shadowBlur=25;
      ctx.fillStyle='#fff';ctx.fillText('☀️🌙 Solved!',CW/2,CH/2-20);
      ctx.shadowBlur=0;ctx.font='14px system-ui';ctx.fillStyle='rgba(255,255,255,.7)';
      ctx.fillText('Tap for new puzzle',CW/2,CH/2+15);ctx.globalAlpha=1;
    }
  }
}

function handleTap(gx,gy){
  if(won){newPuzzle();return;}
  const c=Math.floor((gx-OX)/CS),r=Math.floor((gy-OY)/CS);
  if(r<0||r>=N||c<0||c>=N)return;
  if(given[r][c])return;
  marks[r][c]=(marks[r][c]+1)%3;
  conflicts=calcConflicts();
  if(checkWin())won=true;
}

function loop(){draw();requestAnimationFrame(loop);}
canvas.addEventListener('click',e=>{const rect=canvas.getBoundingClientRect();handleTap((e.clientX-rect.left)/scale,(e.clientY-rect.top)/scale);});
canvas.addEventListener('touchend',e=>{e.preventDefault();const rect=canvas.getBoundingClientRect();handleTap((e.changedTouches[0].clientX-rect.left)/scale,(e.changedTouches[0].clientY-rect.top)/scale);},{passive:false});
document.getElementById('newbtn').addEventListener('click',newPuzzle);

newPuzzle();loop();
</script>
</body>
</html>
